<!DOCTYPE html>
<html>
<head>
  <title>This is a Super Smash Bros Matchup Website !!</title>
  <link rel = "stylesheet" href = "style.css">
</head>

<body>
  <header>
    <h1> Super Smash Matchers </h1>
    <p> Select Your Fighter: </p>
  </header>

  <main class = "fighterContainer">
    
    <div class = "fighter-card">
      <img src = "images/mario.png" alt = "Mario">  
      <h2>Mario</h2>
      <button onclick = "selectedFighter('Mario')">
        Select Fighter
      </button>
    </div>
    
    <div class = "fighter-card">
      <img src = "images/link.png" alt = "Link">  
      <h2>Link</h2>
      <button onclick = "selectedFighter('Link')">
        Select Fighter
      </button>
    </div>
  </main>
    <!-- makting Mathps -->
    <section class = "info-box">
      <h2 id = "selectedText">No Fighter Selected</h2>

      <div id = "matchupInfo">
        Select a Character to view matchups. 
      </div>
    </section>
      
    <script src = "script.js"></script> 
      

  
</body>
</html>
